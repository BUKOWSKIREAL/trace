<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
<rect x="0" y="0" width="1280" height="900" fill="#ffffff"/>
<marker id="a-dark" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0,0 L10,5 L0,10 z" fill="#374151"/></marker>
<marker id="a-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/></marker>
<marker id="a-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/></marker>
<marker id="a-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/></marker>
<text x="40" y="46" font-size="26" font-weight="800" fill="#111827">Trace — Architecture</text>
<text x="40" y="70" font-size="13" fill="#6b7280">Local version tracking for multi-CLI-agent coding workflows</text>
<line x1="742" y1="38" x2="790" y2="38" stroke="#374151" stroke-width="2" marker-end="url(#a-dark)"/>
<text x="798" y="42" font-size="12" fill="#4b5563">data / control flow</text>
<line x1="742" y1="60" x2="790" y2="60" stroke="#9ca3af" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#a-gray)"/>
<text x="798" y="64" font-size="12" fill="#4b5563">startup / dependency</text>
<line x1="742" y1="82" x2="790" y2="82" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#a-purple)"/>
<text x="798" y="86" font-size="12" fill="#4b5563">attribution evidence</text>
<rect x="40" y="100" width="225" height="92" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/><circle cx="64" cy="126" r="14" fill="#3b82f6"/><text x="64" y="131" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="86" y="131" font-size="15" font-weight="700" fill="#1f2937">Select Workspace</text><text x="59" y="155" font-size="12" fill="#4b5563">user picks a folder to track</text>
<line x1="265" y1="146" x2="312" y2="146" stroke="#374151" stroke-width="2" marker-end="url(#a-dark)"/>
<rect x="315" y="88" width="250" height="116" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/><circle cx="339" cy="114" r="14" fill="#3b82f6"/><text x="339" y="119" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="361" y="119" font-size="15" font-weight="700" fill="#1f2937">Repository Init</text><text x="334" y="143" font-size="12" fill="#4b5563">creates .trace/ directory:</text><text x="334" y="161" font-size="12" fill="#4b5563">config.json  ·  index.db</text><text x="334" y="179" font-size="12" fill="#4b5563">blobs/  ·  trace_activity.jsonl</text>
<line x1="565" y1="146" x2="607" y2="146" stroke="#374151" stroke-width="2" marker-end="url(#a-dark)"/>
<rect x="610" y="100" width="225" height="92" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/><circle cx="634" cy="126" r="14" fill="#3b82f6"/><text x="634" y="131" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="656" y="131" font-size="15" font-weight="700" fill="#1f2937">DaemonManager</text><text x="629" y="155" font-size="12" fill="#4b5563">starts watcher (watchdog)</text><text x="629" y="173" font-size="12" fill="#4b5563">and recorder</text>
<line x1="835" y1="132" x2="976" y2="122" stroke="#9ca3af" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#a-gray)"/>
<line x1="835" y1="160" x2="976" y2="198" stroke="#9ca3af" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#a-gray)"/>
<rect x="980" y="92" width="258" height="62" rx="12" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5"/><rect x="996" y="110" width="12" height="12" rx="3" fill="#10b981"/><text x="1018" y="121" font-size="15" font-weight="700" fill="#1f2937">File Watcher</text><text x="999" y="143" font-size="12" fill="#4b5563">watches filesystem events</text>
<rect x="980" y="168" width="258" height="62" rx="12" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5"/><rect x="996" y="186" width="12" height="12" rx="3" fill="#10b981"/><text x="1018" y="197" font-size="15" font-weight="700" fill="#1f2937">Recorder</text><text x="999" y="219" font-size="12" fill="#4b5563">logs the raw event stream</text>
<rect x="28" y="246" width="974" height="258" rx="14" fill="#fffdf6" stroke="#f4c66b" stroke-width="1.5" stroke-dasharray="8 6"/>
<text x="48" y="276" font-size="15" font-weight="700" fill="#b45309">Trace Pipeline</text>
<rect x="48" y="300" width="180" height="150" rx="12" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/><circle cx="72" cy="326" r="14" fill="#f59e0b"/><text x="72" y="331" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">4</text><text x="94" y="331" font-size="15" font-weight="700" fill="#1f2937">TraceHandler</text><text x="67" y="355" font-size="12" fill="#4b5563">receives file events:</text><text x="67" y="373" font-size="12" fill="#4b5563">add / change / unlink</text>
<line x1="228" y1="375" x2="248" y2="375" stroke="#374151" stroke-width="2" marker-end="url(#a-dark)"/>
<rect x="250" y="300" width="182" height="150" rx="12" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/><circle cx="274" cy="326" r="14" fill="#f59e0b"/><text x="274" y="331" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">5</text><text x="296" y="331" font-size="15" font-weight="700" fill="#1f2937">Filter Noise</text><text x="269" y="355" font-size="12" fill="#4b5563">ignore .git / .trace,</text><text x="269" y="373" font-size="12" fill="#4b5563">__pycache__,</text><text x="269" y="391" font-size="12" fill="#4b5563">node_modules &amp; ignores</text>
<line x1="432" y1="375" x2="452" y2="375" stroke="#374151" stroke-width="2" marker-end="url(#a-dark)"/>
<rect x="454" y="300" width="165" height="150" rx="12" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/><circle cx="478" cy="326" r="14" fill="#f59e0b"/><text x="478" y="331" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">6</text><text x="500" y="331" font-size="15" font-weight="700" fill="#1f2937">Debounce</text><text x="473" y="355" font-size="12" fill="#4b5563">wait until the file</text><text x="473" y="373" font-size="12" fill="#4b5563">stops changing</text><text x="473" y="391" font-size="12" fill="#4b5563">(~200 ms)</text>
<line x1="619" y1="375" x2="639" y2="375" stroke="#374151" stroke-width="2" marker-end="url(#a-dark)"/>
<rect x="641" y="300" width="190" height="150" rx="12" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/><circle cx="665" cy="326" r="14" fill="#8b5cf6"/><text x="665" y="331" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">7</text><text x="687" y="331" font-size="15" font-weight="700" fill="#1f2937">Attribution</text><text x="660" y="355" font-size="12" fill="#4b5563">MCP reports first, then</text><text x="660" y="373" font-size="12" fill="#4b5563">activity / transcript /</text><text x="660" y="391" font-size="12" fill="#4b5563">process evidence →</text><text x="660" y="409" font-size="12" fill="#4b5563">author_agent, confidence</text>
<line x1="831" y1="375" x2="851" y2="375" stroke="#374151" stroke-width="2" marker-end="url(#a-dark)"/>
<rect x="853" y="300" width="140" height="150" rx="12" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/><circle cx="877" cy="326" r="14" fill="#8b5cf6"/><text x="877" y="331" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">8</text><text x="899" y="331" font-size="15" font-weight="700" fill="#1f2937">CommitBatcher</text><text x="872" y="355" font-size="12" fill="#4b5563">2 s idle window,</text><text x="872" y="373" font-size="12" fill="#4b5563">aggregate the batch</text>
<rect x="1030" y="250" width="222" height="110" rx="12" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/><rect x="1046" y="268" width="12" height="12" rx="3" fill="#8b5cf6"/><text x="1068" y="279" font-size="15" font-weight="700" fill="#1f2937">MCP / Hook reporting</text><text x="1049" y="301" font-size="12" fill="#4b5563">trace_record_files</text><text x="1049" y="319" font-size="12" fill="#4b5563">→ trace_activity.jsonl</text>
<polyline points="1030,300 1030,285 736,285 736,299" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#a-purple)"/>
<text x="812" y="279" font-size="11" fill="#7c3aed">evidence</text>
<polyline points="923,450 923,522 572,522 572,558" fill="none" stroke="#374151" stroke-width="2" marker-end="url(#a-dark)"/>
<text x="930" y="498" font-size="12" fill="#6b7280">idle ≥ 2 s</text>
<rect x="432" y="560" width="280" height="150" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/><circle cx="456" cy="586" r="14" fill="#2563eb"/><text x="456" y="591" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">9</text><text x="478" y="591" font-size="15" font-weight="700" fill="#1f2937">Repository.commit</text><text x="451" y="615" font-size="12" fill="#4b5563">compute line-level diff</text><text x="451" y="633" font-size="12" fill="#4b5563">write commits / files / changes</text><text x="451" y="651" font-size="12" fill="#4b5563">store file snapshots as blobs</text>
<rect x="92" y="548" width="250" height="96" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/><rect x="108" y="566" width="12" height="12" rx="3" fill="#2563eb"/><text x="130" y="577" font-size="15" font-weight="700" fill="#1f2937">SQLite  (index.db)</text><text x="111" y="599" font-size="12" fill="#4b5563">commits  ·  files</text><text x="111" y="617" font-size="12" fill="#4b5563">changes  ·  attributions</text>
<rect x="92" y="662" width="250" height="86" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/><rect x="108" y="680" width="12" height="12" rx="3" fill="#2563eb"/><text x="130" y="691" font-size="15" font-weight="700" fill="#1f2937">Blob store</text><text x="111" y="713" font-size="12" fill="#4b5563">.trace/blobs/</text><text x="111" y="731" font-size="12" fill="#4b5563">content-addressable snapshots</text>
<line x1="432" y1="596" x2="346" y2="596" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#a-blue)"/>
<polyline points="432,660 390,660 390,700 346,700" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#a-blue)"/>
<line x1="712" y1="635" x2="878" y2="635" stroke="#374151" stroke-width="2" marker-end="url(#a-dark)"/>
<text x="742" y="624" font-size="12" fill="#6b7280">bridge (IPC)</text>
<rect x="880" y="560" width="340" height="150" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/><circle cx="904" cy="586" r="14" fill="#ef4444"/><text x="904" y="591" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">10</text><text x="926" y="591" font-size="15" font-weight="700" fill="#1f2937">Electron Console</text><text x="899" y="615" font-size="12" fill="#4b5563">view diffs, history &amp; attribution</text><text x="899" y="633" font-size="12" fill="#4b5563">restore: revert / checkout</text><text x="899" y="651" font-size="12" fill="#4b5563">by file  ·  commit  ·  range</text>
<rect x="210" y="838" width="860" height="42" rx="21" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="640" y="864" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">Capture  →  Filter  →  Stabilize  →  Attribute  →  Batch  →  Persist  →  Serve to UI</text>
</svg>