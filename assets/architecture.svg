<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="620" viewBox="0 0 1220 620" role="img" aria-labelledby="title desc">
  <title id="title">Trace architecture</title>
  <desc id="desc">File events flow through filtering, attribution, batching, repository storage, and Textual TUI rendering.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .accent { fill: #2563eb; }
      .storage { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.5; }
      .ui { fill: #eef2ff; stroke: #a5b4fc; stroke-width: 1.5; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .num { font: 700 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .arrow { stroke: #2563eb; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
      .label { font: 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect class="bg" width="1220" height="620" rx="28"/>
  <text x="60" y="64" class="title" style="font-size:28px">Trace architecture</text>
  <text x="60" y="92" class="body">Pure Python daemon + SQLite/blob repository + Textual TUI</text>

  <g transform="translate(60,140)">
    <rect class="card" width="190" height="110" rx="16"/>
    <circle class="accent" cx="30" cy="32" r="16"/><text class="num" x="30" y="32">1</text>
    <text class="title" x="56" y="38">File events</text>
    <text class="body" x="24" y="68">create / modify / move</text>
    <text class="body" x="24" y="88">delete via watchdog</text>
  </g>

  <path class="arrow" d="M255 195 H330"/>

  <g transform="translate(335,140)">
    <rect class="card" width="210" height="110" rx="16"/>
    <circle class="accent" cx="30" cy="32" r="16"/><text class="num" x="30" y="32">2</text>
    <text class="title" x="56" y="38">Filter & settle</text>
    <text class="body" x="24" y="68">ignore noise, dedupe</text>
    <text class="body" x="24" y="88">wait until stable</text>
  </g>

  <path class="arrow" d="M550 195 H625"/>

  <g transform="translate(630,140)">
    <rect class="card" width="230" height="110" rx="16"/>
    <circle class="accent" cx="30" cy="32" r="16"/><text class="num" x="30" y="32">3</text>
    <text class="title" x="56" y="38">Attribution</text>
    <text class="body" x="24" y="68">MCP / activity / transcript</text>
    <text class="body" x="24" y="88">process fallback</text>
  </g>

  <path class="arrow" d="M865 195 H940"/>

  <g transform="translate(945,140)">
    <rect class="card" width="215" height="110" rx="16"/>
    <circle class="accent" cx="30" cy="32" r="16"/><text class="num" x="30" y="32">4</text>
    <text class="title" x="56" y="38">Batcher</text>
    <text class="body" x="24" y="68">per-agent timers</text>
    <text class="body" x="24" y="88">2s debounce window</text>
  </g>

  <path class="arrow" d="M1052 255 V330"/>

  <g transform="translate(820,335)">
    <rect class="storage" width="340" height="130" rx="16"/>
    <circle class="accent" cx="30" cy="34" r="16"/><text class="num" x="30" y="34">5</text>
    <text class="title" x="56" y="40">Repository</text>
    <text class="body" x="24" y="72">full-manifest commits in SQLite</text>
    <text class="body" x="24" y="94">SHA-256 blobs in .trace/objects</text>
    <text class="body" x="24" y="116">checkout / restore / revert agent</text>
  </g>

  <path class="arrow" d="M815 400 H700"/>

  <g transform="translate(420,335)">
    <rect class="card" width="275" height="130" rx="16"/>
    <circle class="accent" cx="30" cy="34" r="16"/><text class="num" x="30" y="34">6</text>
    <text class="title" x="56" y="40">Handlers</text>
    <text class="body" x="24" y="72">text / docx / pptx / xlsx</text>
    <text class="body" x="24" y="94">pdf / image / binary</text>
    <text class="body" x="24" y="116">display-only diff layer</text>
  </g>

  <path class="arrow" d="M415 400 H300"/>

  <g transform="translate(60,335)">
    <rect class="ui" width="235" height="130" rx="16"/>
    <circle class="accent" cx="30" cy="34" r="16"/><text class="num" x="30" y="34">7</text>
    <text class="title" x="56" y="40">Textual TUI</text>
    <text class="body" x="24" y="72">Commits / Agents</text>
    <text class="body" x="24" y="94">Workspace / MCP</text>
    <text class="body" x="24" y="116">in-process controller</text>
  </g>

  <path class="arrow" d="M178 335 V265"/>
  <text class="label" x="88" y="510">Data stays local inside each workspace's .trace directory.</text>
</svg>
